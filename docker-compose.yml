name: private-isu
services:
  nginx:
    image: nginx:1.28
    container_name: private-isu-nginx
    depends_on:
      - app
    volumes:
      - ./etc/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/public
      - nginx_log:/var/log/nginx/shared
    ports:
      - "80:80"
    networks:
      - my_network

  app:
    container_name: private-isu-app
    build:
      # Go実装の場合は golang/ PHP実装の場合は php/ Python実装の場合は python/ に変更
      context: golang/
      dockerfile: Dockerfile
    depends_on:
      - mysql
      - memcached
    environment:
      ISUCONP_DB_HOST: mysql
      ISUCONP_DB_PORT: 3306
      ISUCONP_DB_USER: root
      ISUCONP_DB_PASSWORD: root
      ISUCONP_DB_NAME: isuconp
      ISUCONP_MEMCACHED_ADDRESS: memcached:11211
    networks:
      - my_network
    volumes:
      - ./public:/home/public
    init: true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g

  mysql:
    container_name: private-isu-mysql
    image: mysql:8.4
    environment:
      #- "TZ=Asia/Tokyo"
      - "MYSQL_ROOT_HOST=%"
      - "MYSQL_ROOT_PASSWORD=root"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_log:/var/log/mysql
      - ./sql:/docker-entrypoint-initdb.d
      - ./etc/mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "3306:3306"
    networks:
      - my_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g
    
  tools:
    container_name: private-isu-tools
    build:
      context: ./tools
      dockerfile: Dockerfile
    depends_on:
      - mysql
    networks:
      - my_network
    volumes:
      - mysql_log:/var/log/mysql:ro
      - nginx_log:/var/log/nginx/shared:ro

  memcached:
    container_name: private-isu-memcached
    image: memcached:1.6
    networks:
      - my_network

volumes:
  mysql_data:
  mysql_log:
  nginx_log:

networks:
  my_network:
